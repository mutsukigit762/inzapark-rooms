<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>インザパーク 部屋番号収集</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e0ddd7;
    --text: #1a1917;
    --sub: #8a8780;
    --south: #4a7c6f;
    --season: #6b5b8a;
    --unknown: #7a6a55;
    --key-bg: #eceae5;
    --key-active: #d4d1ca;
    --accent: #c8a97a;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--text);
  }

  header {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    padding: 16px 20px 12px;
    text-align: center;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--sub);
  }

  /* タブ */
  .tabs {
    display: flex;
    border-top: 1px solid var(--border);
  }

  .tab-btn {
    flex: 1;
    padding: 11px;
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 500;
    color: var(--sub);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .tab-btn.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  .main {
    width: 100%;
    max-width: 420px;
    padding: 20px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .tab-panel { display: none; flex-direction: column; gap: 20px; }
  .tab-panel.active { display: flex; }

  /* 棟トグル */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--sub);
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
  }

  .tong-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--surface);
  }

  .tong-btn {
    flex: 1;
    padding: 14px 8px;
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 500;
    color: var(--sub);
    cursor: pointer;
    transition: all 0.15s ease;
    border-right: 1px solid var(--border);
    line-height: 1.3;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }

  .tong-btn:last-child { border-right: none; }
  .tong-btn.active-south { background: var(--south); color: #fff; }
  .tong-btn.active-season { background: var(--season); color: #fff; }
  .tong-btn.active-unknown { background: var(--unknown); color: #fff; }

  /* 番号表示 */
  .number-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 68px;
  }

  .number-value {
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 0.06em;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    min-width: 120px;
  }

  .number-value.empty { color: var(--border); }

  .clear-btn {
    background: none;
    border: none;
    color: var(--sub);
    font-size: 22px;
    cursor: pointer;
    padding: 4px 8px;
    opacity: 0.6;
  }

  /* テンキー */
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .key {
    background: var(--key-bg);
    border: none;
    border-radius: 10px;
    padding: 0;
    height: 60px;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    cursor: pointer;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .key:active { background: var(--key-active); }
  .key.key-del { font-size: 18px; color: var(--sub); }
  .key.key-empty { background: transparent; cursor: default; }

  /* 登録ボタン */
  .submit-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .submit-btn:disabled { opacity: 0.35; cursor: default; }
  .submit-btn:not(:disabled):active { opacity: 0.8; }

  .sync-status {
    font-size: 11px;
    color: var(--sub);
    text-align: center;
    min-height: 16px;
  }

  /* 一覧タブ フィルター */
  .filter-bar {
    display: flex;
    gap: 6px;
  }

  .filter-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    font-weight: 500;
    color: var(--sub);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }

  .filter-btn.active-all { background: var(--text); color: #fff; border-color: var(--text); }
  .filter-btn.active-south { background: var(--south); color: #fff; border-color: var(--south); }
  .filter-btn.active-season { background: var(--season); color: #fff; border-color: var(--season); }
  .filter-btn.active-unknown { background: var(--unknown); color: #fff; border-color: var(--unknown); }

  /* ログ一覧 */
  .list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .list-count {
    font-size: 12px;
    color: var(--sub);
  }

  .log-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .log-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .log-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-south { background: var(--south); }
  .dot-season { background: var(--season); }
  .dot-unknown { background: var(--unknown); }

  .log-room {
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    flex: 1;
  }

  .log-room.room-season { color: var(--season); }
  .log-room.room-other { color: var(--south); }

  .log-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .log-tong {
    font-size: 11px;
    color: var(--sub);
  }

  .log-date {
    font-size: 10px;
    color: var(--border);
  }

  .log-del {
    background: none;
    border: none;
    color: var(--border);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
  }
  .log-del:active { color: #c0392b; }

  .empty-state {
    text-align: center;
    padding: 40px 0;
    color: var(--border);
    font-size: 14px;
  }

  /* トースト */
  #toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #333;
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.2s ease;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  #toast.error {
    background: #c0392b;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>IN THE PARK 荻窪 — 部屋番号</h1>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('input')">入力</button>
    <button class="tab-btn" onclick="switchTab('list')">一覧</button>
  </div>
</header>

<div class="main">

  <!-- 入力タブ -->
  <div class="tab-panel active" id="panel-input">

    <div>
      <span class="section-label">棟</span>
      <div class="tong-toggle">
        <button class="tong-btn active-south" id="btn-south" onclick="selectTong('south')">サウス<br>テラス</button>
        <button class="tong-btn" id="btn-season" onclick="selectTong('season')">シーズン<br>テラス</button>
        <button class="tong-btn" id="btn-unknown" onclick="selectTong('unknown')">インザパーク<br>（棟不明）</button>
      </div>
    </div>

    <div>
      <span class="section-label">部屋番号</span>
      <div class="number-display">
        <span class="number-value empty" id="numDisplay">—</span>
        <button class="clear-btn" onclick="clearNum()">⌫</button>
      </div>
    </div>

    <div class="keypad">
      <button class="key" onclick="pressKey('7')">7</button>
      <button class="key" onclick="pressKey('8')">8</button>
      <button class="key" onclick="pressKey('9')">9</button>
      <button class="key" onclick="pressKey('4')">4</button>
      <button class="key" onclick="pressKey('5')">5</button>
      <button class="key" onclick="pressKey('6')">6</button>
      <button class="key" onclick="pressKey('1')">1</button>
      <button class="key" onclick="pressKey('2')">2</button>
      <button class="key" onclick="pressKey('3')">3</button>
      <button class="key key-empty"></button>
      <button class="key" onclick="pressKey('0')">0</button>
      <button class="key key-del" onclick="deleteKey()">⌫</button>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submit()" disabled>登録</button>
    <div class="sync-status" id="syncStatus"></div>

  </div>

  <!-- 一覧タブ -->
  <div class="tab-panel" id="panel-list">

    <div class="filter-bar">
      <button class="filter-btn active-all" id="f-all" onclick="setFilter('all')">すべて</button>
      <button class="filter-btn" id="f-south" onclick="setFilter('south')">サウス</button>
      <button class="filter-btn" id="f-season" onclick="setFilter('season')">シーズン</button>
      <button class="filter-btn" id="f-unknown" onclick="setFilter('unknown')">不明</button>
    </div>

    <div class="list-header">
      <span class="section-label" style="margin-bottom:0">登録データ</span>
      <span class="list-count" id="listCount">0件</span>
    </div>

    <div class="log-list" id="logList"></div>

  </div>

</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, serverTimestamp, query, orderBy, onSnapshot, getDocs, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCy2qi8vFTqlqjc0VBd8GEbuh6FO0fhs9w",
  authDomain: "memo-ce334.firebaseapp.com",
  projectId: "memo-ce334",
  storageBucket: "memo-ce334.firebasestorage.app",
  messagingSenderId: "732811990086",
  appId: "1:732811990086:web:5b69ceb89f80cae7f9a647"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const COLL = "inzapark_rooms";

let currentTong = 'south';
let currentNum = '';
let allDocs = [];
let currentFilter = 'all';

const TONG_LABEL = {
  south: 'サウステラス',
  season: 'シーズンテラス',
  unknown: 'インザパーク'
};

const TONG_DOT = {
  south: 'dot-south',
  season: 'dot-season',
  unknown: 'dot-unknown'
};

// 全件リアルタイム購読
const q = query(collection(db, COLL), orderBy('createdAt', 'desc'));

onSnapshot(q, (snap) => {
  allDocs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderList();
  setSyncStatus('');
}, (err) => {
  setSyncStatus('接続エラー');
  console.error(err);
});

// タブ切り替え
window.switchTab = function(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'input') || (i === 1 && tab === 'list'));
  });
  document.getElementById('panel-input').classList.toggle('active', tab === 'input');
  document.getElementById('panel-list').classList.toggle('active', tab === 'list');
};

// 棟選択
window.selectTong = function(tong) {
  currentTong = tong;
  ['south', 'season', 'unknown'].forEach(t => {
    const btn = document.getElementById('btn-' + t);
    btn.className = 'tong-btn' + (t === tong ? ' active-' + t : '');
  });
};

// テンキー
window.pressKey = function(k) {
  if (currentNum.length >= 4) return;
  currentNum += k;
  updateDisplay();
};

window.deleteKey = function() {
  currentNum = currentNum.slice(0, -1);
  updateDisplay();
};

window.clearNum = function() {
  currentNum = '';
  updateDisplay();
};

// シーズンテラスの階ごとの番号範囲
const SEASON_RANGES = {
  1: [118, 123],
  2: [218, 233],
  3: [318, 333],
  4: [418, 435],
  5: [518, 534],
  6: [618, 633],
  7: [717, 731],
  8: [815, 827],
  9: [914, 925],
  10: [1013, 1022],
  11: [1111, 1120],
  12: [1211, 1220]
};

function isSeasonNumber(numStr) {
  const n = parseInt(numStr, 10);
  if (isNaN(n)) return false;
  // 階番号 = 下2桁を除いた部分
  const floor = Math.floor(n / 100);
  const range = SEASON_RANGES[floor];
  if (!range) return false;
  return n >= range[0] && n <= range[1];
}

function updateDisplay() {
  const el = document.getElementById('numDisplay');
  if (currentNum === '') {
    el.textContent = '—';
    el.classList.add('empty');
  } else {
    el.textContent = currentNum;
    el.classList.remove('empty');
  }
  document.getElementById('submitBtn').disabled = currentNum === '';
}

// 登録（重複チェックあり）
window.submit = async function() {
  if (!currentNum) return;

  // 重複チェック
  const dup = allDocs.find(d => d.room === currentNum && d.tong === currentTong);
  if (dup) {
    showToast(`${TONG_LABEL[currentTong]} ${currentNum} はすでに登録済み`, true);
    return;
  }

  setSyncStatus('保存中…');
  try {
    await addDoc(collection(db, COLL), {
      room: currentNum,
      tong: currentTong,
      createdAt: serverTimestamp()
    });
    showToast(`${TONG_LABEL[currentTong]} ${currentNum} を登録`);
    currentNum = '';
    updateDisplay();
  } catch(e) {
    setSyncStatus('保存失敗');
    console.error(e);
  }
};

// 削除
window.deleteLog = async function(id) {
  try {
    await deleteDoc(doc(db, COLL, id));
  } catch(e) {
    console.error(e);
  }
};

// フィルター
window.setFilter = function(f) {
  currentFilter = f;
  ['all', 'south', 'season', 'unknown'].forEach(k => {
    const btn = document.getElementById('f-' + k);
    btn.className = 'filter-btn' + (k === f ? ' active-' + k : '');
  });
  renderList();
};

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const m = d.getMonth() + 1;
  const day = d.getDate();
  return `${m}/${day}`;
}

function renderList() {
  const filtered = currentFilter === 'all'
    ? allDocs
    : allDocs.filter(d => d.tong === currentFilter);

  document.getElementById('listCount').textContent = filtered.length + '件';

  const list = document.getElementById('logList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">データなし</div>';
    return;
  }

  list.innerHTML = filtered.map(d => `
    <div class="log-item">
      <span class="log-dot ${TONG_DOT[d.tong] || 'dot-unknown'}"></span>
      <span class="log-room ${isSeasonNumber(d.room) ? 'room-season' : 'room-other'}">${d.room}</span>
      <div class="log-meta">
        <span class="log-tong">${TONG_LABEL[d.tong] || d.tong}</span>
        <span class="log-date">${formatDate(d.createdAt)}</span>
      </div>
      <button class="log-del" onclick="deleteLog('${d.id}')">×</button>
    </div>
  `).join('');
}

function setSyncStatus(msg) {
  document.getElementById('syncStatus').textContent = msg;
}

let toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = isError ? 'error show' : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2500);
}
</script>
</body>
</html>
